  PEN_EPCawareness:
    EPC (Energy Performance Certificate) is a rating scheme that summarises
    the energy efficiency of homes, commercial and industrial properties... It uses
    a scale from 'A' (Very efficient) to 'G' (Inefficient) and the higher the rating,
    the more energy efficient your home is...  Before taking this survey, had you
    ever heard of EPC?
